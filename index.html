<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function()
        {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni_Intr0</title>
    <link rel="icon" type="image/x-icon" href="/Uni.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="page-wrapper" class="landing-shell">
        <nav class="app-navbar sticky-top" aria-label="Primary navigation">
            <div class="app-navbar-inner">
                <a id="Home" class="brand-link" href="index.html">Uni_Intr0</a>
                <button id="terminal" class="theme-button" type="button" data-bs-toggle="tooltip" data-bs-placement="left" title="Terminal Theme" aria-label="Toggle theme">
                    <i class="fa-solid fa-code" aria-hidden="true"></i>
                </button>
            </div>
        </nav>

        <main class="landing-main">
            <section class="landing-panel" aria-labelledby="Header">
                <!-- <p class="status-label">Beta</p> -->
                <h1 id="Header" class="landing-title">Uni_Intr0</h1>
                <p class="landing-copy">Youths 2 Youths. <br>Find your true passion with our pre-trained AI.</p>
                <button id="Start" class="start-button" type="button">
                    <span>Open Directory</span>
                    <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                </button>
            </section>
        </main>
<!-- Explore Myanmar universities by category, compare available majors, and keep useful admission notes in one focused place. -->
        <footer class="landing-footer">
            <span>Built by Zephyr</span>
            <span>&copy; Copyright</span>
        </footer>
    </div>

    <script>
        const btn = document.getElementById('Start');
        const container = document.getElementById('page-wrapper');

        window.addEventListener('pageshow', () => {
            container.classList.remove('animate');
        });

        btn.addEventListener('click', (e) => {
            e.preventDefault();
            container.classList.remove('animate');
            void container.offsetWidth;
            container.classList.add('animate');
        });

        container.addEventListener('animationend', (e) => {
            if (e.animationName === 'fadeOut')
            {
                window.location.href = 'Menu.html';
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="theme.js"></script>
</body>
</html>
