<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function()
        {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni_Intr0 | Universities</title>
    <link rel="icon" type="image/x-icon" href="/Uni.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="theme.css?v=5">
    <link rel="stylesheet" href="menu.css?v=5">
</head>
<body>
    <div class="page-shell" id="pageShell">
        <nav class="app-navbar sticky-top" aria-label="Primary navigation">
            <div class="app-navbar-inner">
                <a id="Home" class="brand-link" href="index.html">Uni_Intr0</a>
                <button id="terminal" class="theme-button" type="button" data-bs-toggle="tooltip" data-bs-placement="left" title="Terminal Theme" aria-label="Toggle theme">
                    <i class="fa-solid fa-code" aria-hidden="true"></i>
                </button>
            </div>
        </nav>

        <main class="app-main">
            <section id="categoryView" class="app-view is-active" aria-labelledby="categoryTitle">
                <div class="view-container">
                    <h1 id="categoryTitle" class="page-title">University by Category</h1>
                    <div id="categoryGrid" class="category-grid" aria-live="polite"></div>
                </div>
            </section>

            <section id="listView" class="app-view" aria-labelledby="listTitle">
                <div class="view-container view-container-narrow">
                    <div class="view-toolbar">
                        <button id="backToCategories" class="back-button" type="button">
                            <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                            <span>Categories</span>
                        </button>
                    </div>
                    <h1 id="listTitle" class="page-title">Universities List</h1>
                    <div id="universityList" class="university-list" aria-live="polite"></div>
                </div>
            </section>

            <section id="detailView" class="app-view" aria-labelledby="detailTitle">
                <div class="view-container detail-container">
                    <div class="view-toolbar detail-toolbar">
                        <button id="backToList" class="back-button" type="button">
                            <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                            <span>Universities</span>
                        </button>
                    </div>
                    <h1 id="detailTitle" class="page-title">University</h1>
                    <div id="detailImage" class="university-image-slot" aria-live="polite"></div>
                    <div id="detailTabs" class="detail-tabs" role="tablist" aria-label="University information tabs"></div>
                    <article id="detailPanel" class="detail-panel" tabindex="-1"></article>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="theme.js?v=5"></script>
    <script src="Main.js?v=5"></script>
</body>
</html>
