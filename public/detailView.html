<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function()
        {
            const storedTheme = localStorage.getItem('theme') || 'light';
            const theme = storedTheme === 'terminal' ? 'dark' : storedTheme;
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni_Intr0 | University Detail</title>
    <link rel="icon" type="image/x-icon" href="/Uni.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="theme.css?v=9">
    <link rel="stylesheet" href="menu.css?v=21">
</head>
<body>
    <div class="page-shell" id="pageShell" data-view="detail">
        <nav class="app-navbar sticky-top" aria-label="Primary navigation">
            <div class="app-navbar-inner">
                <a id="Home" class="brand-link" href="index.html">Uni_Intr0</a>
                <div class="navbar-actions" role="group" aria-label="Page actions">
                    <a class="navbar-action-button navbar-contribute-button" href="https://telegram.me/Uni_Inro_Official_Bot" target="_blank" rel="noopener noreferrer" title="Contribute university information" aria-label="Contribute university information">
                        <i class="fa-solid fa-pen-to-square" aria-hidden="true"></i>
                        <span>Contribute</span>
                    </a>
                    <a class="navbar-action-button navbar-community-button" href="https://telegram.me/Uni_Intro_Student_Hub" target="_blank" rel="noopener noreferrer" title="Join and make friends with others." aria-label="Join and make friends with others.">
                        <i class="fa-brands fa-telegram" aria-hidden="true"></i>
                        <span>Join Community</span>
                    </a>
                    <button id="terminal" class="theme-button" type="button" data-bs-toggle="tooltip" data-bs-placement="left" title="Dark Theme" aria-label="Switch to dark theme">
                        <i class="fa-solid fa-moon" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </nav>
        <main class="app-main">
            <section id="detailView" class="app-view is-active" aria-labelledby="detailTitle">
                <div class="view-container detail-container">
                    <div class="view-toolbar detail-toolbar">
                        <button id="backToList" class="back-button" type="button">
                            <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                            <span>Universities</span>
                        </button>
                    </div>
                    <h1 id="detailTitle" class="page-title">University</h1>
                    <div id="detailImage" class="university-image-slot" aria-live="polite"></div>
                    <div id="detailTabs" class="detail-tabs" role="tablist" aria-label="University information tabs"></div>
                    <article id="detailPanel" class="detail-panel" tabindex="-1"></article>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="theme.js?v=7"></script>
    <script src="Main.js?v=42"></script>
</body>
</html>
